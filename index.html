<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Mastery: Architecture & Playbook</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080c16;
            --card-bg: rgba(15, 23, 42, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #06b6d4; /* Cyan */
            --accent-secondary: #3b82f6; /* Blue */
            --border-color: rgba(6, 182, 212, 0.3);
            --glass-bg: rgba(15, 23, 42, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            height: 100vh;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid var(--card-bg);
            border-top: 5px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Sidebar Styling */
        .sidebar {
            background: #0f172a;
            border-right: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: calc(100vh - 4rem);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .search-box {
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-box input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-primary);
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Axis List */
        .axis-group {
            margin-bottom: 1.5rem;
        }
        .axis-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .axis-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .module-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .module-item {
            padding: 0.8rem 1rem;
            border-radius: 10px;
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .module-item:hover {
            background: rgba(6, 182, 212, 0.1);
            border-color: rgba(6, 182, 212, 0.2);
            transform: translateX(5px);
        }
        .module-item.active {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.2), transparent);
            border-left: 4px solid var(--accent-primary);
        }
        .module-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-primary);
            font-weight: 600;
        }
        .module-title-text {
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .module-check {
            margin-left: auto;
            width: 14px; height: 14px;
            border: 2px solid var(--accent-secondary);
            border-radius: 4px;
            opacity: 0.3;
        }
        .module-item.completed .module-check {
            background: var(--accent-secondary);
            opacity: 1;
            box-shadow: 0 0 8px var(--accent-secondary);
        }

        /* Main Content View */
        .main-content {
            background: #0b1120;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            overflow-y: auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        /* Dashboard Overview */
        .dashboard-home {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .welcome-hero {
            text-align: center;
            padding: 4rem 2rem;
            background: radial-gradient(circle at center, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            border-radius: 20px;
        }
        .welcome-hero h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: white;
        }

        .radar-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Viewer Styles */
        .viewer {
            padding: 3rem;
            display: none;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .content-meta {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-complete {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-complete:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }

        /* Markdown Styling */
        .markdown-body h1 { color: var(--accent-primary); border-bottom: 2px solid var(--accent-primary); padding-bottom: 0.5rem; margin: 2rem 0 1rem; font-family: 'Outfit', sans-serif; }
        .markdown-body h2 { color: var(--accent-secondary); margin: 1.5rem 0 1rem; font-family: 'Outfit', sans-serif; }
        .markdown-body h3 { color: #f8fafc; margin: 1.2rem 0 0.8rem; }
        .markdown-body p { margin-bottom: 1rem; font-size: 1.05rem; }
        .markdown-body pre { background: #011627; padding: 1.5rem; border-radius: 12px; overflow-x: auto; margin: 1.5rem 0; border: 1px solid rgba(255, 255, 255, 0.1); }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; color: #2dd4bf; }
        .markdown-body ul, .markdown-body ol { margin-left: 2rem; margin-bottom: 1rem; font-size: 1.05rem; }
        .markdown-body li { margin-bottom: 0.5rem; }
        .markdown-body blockquote { border-left: 4px solid var(--accent-primary); background: rgba(6, 182, 212, 0.1); padding: 1rem; margin: 1.5rem 0; font-style: italic; border-radius: 0 8px 8px 0; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
        .markdown-body th, .markdown-body td { border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.8rem; text-align: left; }
        .markdown-body th { background: rgba(6, 182, 212, 0.15); color: var(--accent-primary); }
        
        .markdown-body blockquote strong { color: var(--accent-primary); }

        /* Responsive */
        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; height: auto; }
            .sidebar { position: relative; height: auto; width: 100%; }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .mermaid { background: transparent !important; padding: 24px; border-radius: 16px; margin: 32px 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .mermaid svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="container">
        <aside class="sidebar">
            <header class="header">
                <h1 id="portal-title">SQL MASTERY</h1>
                <p id="portal-subtitle">Architecture & Practical Playbook</p>
            </header>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="モジュールを検索...">
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-progress">0%</div>
                    <div class="stat-label">Progress</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completed-count">0/12</div>
                    <div class="stat-label">Modules</div>
                </div>
            </div>

            <nav id="axis-list">
                <!-- Axes injected here -->
            </nav>
        </aside>

        <main class="main-content">
            <!-- Home View -->
            <div id="dashboard-home" class="dashboard-home">
                <section class="welcome-hero">
                    <h2 id="hero-title">Architect the Data.</h2>
                    <p>単なる暗記ではなく、「なぜそう書くのか？」という設計思想と内部挙動からSQLを極めましょう。</p>
                </section>

                <div class="radar-container">
                    <canvas id="masteryRadar"></canvas>
                </div>
            </div>

            <!-- Content Viewer -->
            <div id="viewer" class="viewer">
                <div class="content-meta">
                    <span id="current-id" class="module-id" style="font-size: 1.2rem;">1.1</span>
                    <button class="btn-complete" id="mark-complete-btn">完了としてマーク</button>
                </div>
                <div id="markdown-content" class="markdown-body">
                    <!-- Content injected here -->
                </div>
            </div>
        </main>
    </div>

    <script src="bundle_data.js"></script>
    <script>
        let masteryData = JSON.parse(localStorage.getItem(studyData.localStorageKey)) || {};
        let currentModuleId = null;
        let radarChart = null;

        function init() {
            document.getElementById('portal-title').textContent = studyData.title;
            document.getElementById('portal-subtitle').textContent = studyData.subtitle;
            renderAxes();
            updateGlobalStats();
            initRadar();
            
            mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
            
            marked.use({
                renderer: {
                    code(token) {
                        if (token.lang === 'mermaid') {
                            return `<div class="mermaid">${token.text}</div>`;
                        }
                        return `<pre><code class="language-${token.lang}">${token.text}</code></pre>`;
                    }
                }
            });

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            }, 800);

            document.getElementById('search-input').addEventListener('input', handleSearch);
        }

        function renderAxes() {
            const list = document.getElementById('axis-list');
            list.innerHTML = '';
            studyData.axes.forEach(axis => {
                const group = document.createElement('div');
                group.className = 'axis-group';
                group.innerHTML = `<div class="axis-title">${axis.title}</div>`;
                
                const ul = document.createElement('ul');
                ul.className = 'module-list';
                axis.modules.forEach(mod => {
                    const isCompleted = masteryData[mod.id];
                    const li = document.createElement('li');
                    li.className = `module-item ${isCompleted ? 'completed' : ''}`;
                    li.id = `nav-${mod.id}`;
                    li.onclick = () => loadModule(mod.id);
                    li.innerHTML = `
                        <span class="module-id">${mod.id}</span>
                        <span class="module-title-text">${mod.title}</span>
                        <div class="module-check"></div>
                    `;
                    ul.appendChild(li);
                });
                group.appendChild(ul);
                list.appendChild(group);
            });
        }

        async function loadModule(id) {
            currentModuleId = id;
            const container = document.getElementById('dashboard-home');
            const viewer = document.getElementById('viewer');
            const mdContent = document.getElementById('markdown-content');
            
            container.style.display = 'none';
            viewer.style.display = 'block';
            
            const axis = studyData.axes.find(a => a.modules.some(m => m.id === id));
            const mod = axis.modules.find(m => m.id === id);
            
            document.getElementById('current-id').textContent = `PHASE ${mod.id} - ${mod.title}`;
            
            document.querySelectorAll('.module-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${id}`).classList.add('active');

            try {
                let text = moduleContents[id];
                if (!text) throw new Error("Content missing or failed to build from bundle");
                
                // Parse GitHub-style alerts
                text = text.replace(/> \\[!IMPORTANT\\]/g, '> **💡 CRITICAL**<br>');
                text = text.replace(/> \\[!WARNING\\]/g, '> **⚠️ WARNING**<br>');
                text = text.replace(/> \\[!TIP\\]/g, '> **✨ PRO TIP**<br>');
                text = text.replace(/> \\[!CAUTION\\]/g, '> **🚨 CAUTION**<br>');
                
                mdContent.innerHTML = marked.parse(text);
                
                if (window.mermaid) {
                    setTimeout(() => {
                        mermaid.init(undefined, ".mermaid");
                    }, 20);
                }

                viewer.scrollTop = 0;
            } catch (e) {
                console.error(e);
                mdContent.innerHTML = \`<h1>Content Not Found</h1><p>モジュール \${id} のコンテンツが見つかりませんでした。</p>\`;
            }

            updateCompleteBtn(id);
        }

        function updateCompleteBtn(id) {
            const btn = document.getElementById('mark-complete-btn');
            if (masteryData[id]) {
                btn.textContent = '完了済み';
                btn.style.opacity = '0.6';
            } else {
                btn.textContent = '完了としてマーク';
                btn.style.opacity = '1';
            }
            btn.onclick = () => toggleComplete(id);
        }

        function toggleComplete(id) {
            masteryData[id] = !masteryData[id];
            localStorage.setItem(studyData.localStorageKey, JSON.stringify(masteryData));
            
            const navItem = document.getElementById(\`nav-\${id}\`);
            if (masteryData[id]) navItem.classList.add('completed');
            else navItem.classList.remove('completed');
            
            updateGlobalStats();
            updateCompleteBtn(id);
            updateRadar();
        }

        function updateGlobalStats() {
            const total = studyData.axes.reduce((acc, axis) => acc + axis.modules.length, 0);
            const completed = Object.values(masteryData).filter(v => v).length;
            const percentage = Math.round((completed / total) * 100) || 0;
            
            document.getElementById('total-progress').textContent = \`\${percentage}%\`;
            document.getElementById('completed-count').textContent = \`\${completed}/\${total}\`;
            
            document.getElementById('hero-title').textContent = percentage === 100 ? "SQL Mastered!" : "Architect the Data.";
        }

        function handleSearch(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.module-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(term) ? 'flex' : 'none';
            });
        }

        function initRadar() {
            const ctx = document.getElementById('masteryRadar').getContext('2d');
            const labels = studyData.axes.map(a => a.title.split(":")[1] || a.title); 
            const data = studyData.axes.map(axis => {
                const completed = axis.modules.filter(m => masteryData[m.id]).length;
                return (completed / axis.modules.length) * 100;
            });

            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Mastery Level (%)',
                        data: data,
                        backgroundColor: 'rgba(6, 182, 212, 0.2)',
                        borderColor: studyData.themeColor,
                        pointBackgroundColor: studyData.secondaryColor,
                        borderWidth: 3
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { color: '#94a3b8', font: { size: 12, family: 'Outfit' } },
                            ticks: { display: false, stepSize: 20 },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateRadar() {
            const data = studyData.axes.map(axis => {
                const completed = axis.modules.filter(m => masteryData[m.id]).length;
                return (completed / axis.modules.length) * 100;
            });
            radarChart.data.datasets[0].data = data;
            radarChart.update();
        }

        document.getElementById('portal-title').addEventListener('click', () => {
             document.getElementById('dashboard-home').style.display = 'flex';
             document.getElementById('viewer').style.display = 'none';
             document.querySelectorAll('.module-item').forEach(el => el.classList.remove('active'));
        });
        document.getElementById('portal-title').style.cursor = 'pointer';

        window.onload = init;
    </script>
</body>
</html>
