<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SQL Mastery: Architecture & Practical Playbook">
    <title>SQL Mastery Portal</title>
    
    <!-- Dependencies with fallback support -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020617;
            --card-glass: rgba(15, 23, 42, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #06b6d4;
            --gradient: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 380px;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(6, 182, 212, 0.1), transparent);
        }

        /* Nav Items */
        .nav-item {
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid transparent;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(6, 182, 212, 0.15); border-color: var(--accent); }
        .nav-id { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: bold; width: 30px; }

        /* Typography */
        .markdown-body { font-size: 1.1rem; line-height: 1.8; color: #cbd5e1; max-width: 900px; margin: 0 auto; }
        .markdown-body h1 { font-size: 2.5rem; color: #fff; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .markdown-body h2 { font-size: 1.8rem; color: var(--accent); margin-top: 3rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 0.5rem; }
        .markdown-body blockquote { border-left: 5px solid var(--accent); background: rgba(6, 182, 212, 0.1); padding: 1.5rem; border-radius: 0 12px 12px 0; margin: 2rem 0; color: #fff; }
        .markdown-body pre { background: #0f172a; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-glass); overflow-x: auto; }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; color: #2dd4bf; }

        .mermaid { background: rgba(0,0,0,0.2); padding: 2rem; border-radius: 16px; margin: 2rem 0; text-align: center; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(6, 182, 212, 0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-complete { background: var(--gradient); border: none; padding: 1rem 2rem; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; float: right; }
        .btn-complete.done { background: #10b981; }

        #dashboard { text-align: center; padding: 4rem 2rem; }
        .radar-box { max-width: 500px; margin: 2rem auto; background: var(--card-glass); padding: 2rem; border-radius: 24px; border: 1px solid var(--border-glass); }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<aside class="sidebar">
    <h2 style="margin-bottom: 2rem; letter-spacing: -1px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SQL MASTERY</h2>
    <div id="nav-container"></div>
</aside>

<main class="main-content" id="main-scroll">
    <div id="content-view"></div>
</main>

<script src="dashboard_data.js"></script>

<script>
    // State
    let progress = JSON.parse(localStorage.getItem(studyData.localStorageKey)) || {};
    let activeId = null;
    let radar = null;

    function init() {
        renderNav();
        showDashboard();
        
        // Mermaid Config
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

        // Marked Config (Solid & Fail-safe)
        const renderer = new marked.Renderer();
        renderer.code = function(code, lang) {
            // Handle different marked versions
            const text = (typeof code === 'object') ? code.text : code;
            const language = (typeof code === 'object') ? code.lang : lang;
            
            if (language === 'mermaid') {
                return `<div class="mermaid">${text}</div>`;
            }
            return `<pre><code class="language-${language}">${text}</code></pre>`;
        };
        marked.use({ renderer });

        document.getElementById('loader').style.opacity = 0;
        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
    }

    function renderNav() {
        const container = document.getElementById('nav-container');
        container.innerHTML = '';
        studyData.axes.forEach(axis => {
            const title = document.createElement('h4');
            title.style.color = 'var(--text-secondary)';
            title.style.margin = '1.5rem 0 0.5rem';
            title.style.fontSize = '0.8rem';
            title.textContent = axis.title;
            container.appendChild(title);
            
            axis.modules.forEach(mod => {
                const item = document.createElement('div');
                item.className = `nav-item ${progress[mod.id] ? 'active' : ''}`;
                item.onclick = () => loadModule(mod.id);
                item.innerHTML = `<span class="nav-id">${mod.id}</span> <span style="font-size: 0.9rem">${mod.title}</span>`;
                container.appendChild(item);
            });
        });
    }

    function showDashboard() {
        const view = document.getElementById('content-view');
        view.innerHTML = `
            <div id="dashboard">
                <h1 style="font-size: 3rem; margin-bottom: 1rem">Welcome, Architect.</h1>
                <p style="color: var(--text-secondary); margin-bottom: 3rem">設計思想から学び直す、実務特化型SQLトレーニング</p>
                <div class="radar-box"><canvas id="radarCanvas"></canvas></div>
            </div>
        `;
        initRadar();
    }

    function loadModule(id) {
        activeId = id;
        const view = document.getElementById('content-view');
        const content = moduleContents[id] || "# Content Missing";
        
        view.innerHTML = `
            <button class="btn-complete ${progress[id] ? 'done' : ''}" onclick="toggleDone('${id}')">
                ${progress[id] ? 'Mastered ✓' : 'Mark as Complete'}
            </button>
            <div class="markdown-body">${marked.parse(content)}</div>
        `;

        if (window.mermaid) {
            // Re-render mermaid diagrams
            setTimeout(() => {
                mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            }, 50);
        }
        document.getElementById('main-scroll').scrollTop = 0;
    }

    function toggleDone(id) {
        progress[id] = !progress[id];
        localStorage.setItem(studyData.localStorageKey, JSON.stringify(progress));
        loadModule(id);
        renderNav();
    }

    function initRadar() {
        const ctx = document.getElementById('radarCanvas').getContext('2d');
        const labels = studyData.axes.map(a => a.title.split(":")[0]);
        const data = studyData.axes.map(axis => {
            const total = axis.modules.length;
            const done = axis.modules.filter(m => progress[m.id]).length;
            return (done / total) * 100;
        });

        if (radar) radar.destroy();
        radar = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Mastery',
                    data: data,
                    backgroundColor: 'rgba(6, 182, 212, 0.2)',
                    borderColor: '#06b6d4',
                    borderWidth: 2,
                    pointBackgroundColor: '#06b6d4'
                }]
            },
            options: {
                scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.1)' } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
